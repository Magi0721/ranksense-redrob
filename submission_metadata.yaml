ai_usage_summary: |
  Used Claude (Anthropic) as a development assistant for architecture design,
  code authoring, and debugging of the scoring pipeline and reasoning-string
  generator. All scoring logic, feature weights, and disqualifier rules were
  designed and reviewed against the released job description and signals
  documentation. No candidate data was sent to any external LLM API at any
  point — the ranking pipeline itself (rank.py) makes zero hosted API calls
  and runs fully offline on CPU, consistent with the competition's compute
  constraints.

# ============================================================================
methodology_summary: |
  Hybrid ranker combining (1) structured role/seniority/location/education
  fit read from profile and career_history, (2) trust-adjusted skill
  matching that discounts claimed skills unsupported by the candidate's own
  Redrob skill_assessment_scores or implausible duration_months, (3)
  semantic fit via TF-IDF + cosine similarity between JD text and candidate
  free text (no pretrained embeddings, fully offline), (4) hard disqualifier
  multipliers mirroring the JD's explicit exclusion list (consulting-only
  career, pure-research-without-deployment, shallow recent-only LangChain
  experience, CV/speech/robotics-only background, title-chasing tenure
  patterns, leadership-only roles with no recent hands-on code), and (5) a
  behavioral availability multiplier from recruiter response rate, last
  active date, interview completion rate, and notice period. An upstream
  honeypot/integrity filter excludes internally-inconsistent profiles
  (e.g. "expert" proficiency with 0 months used) before scoring. Full
  100K-candidate run completes in well under a minute on CPU.

